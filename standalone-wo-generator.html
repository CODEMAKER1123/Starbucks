<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starbucks Work Order Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0f1a; color: #e5e7eb; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #0a0f1a 0%, #0d2137 50%, rgba(0,164,199,0.3) 100%); padding: 24px 32px; display: flex; align-items: center; gap: 16px; }
  .logo { background: white; color: #00A4C7; font-family: Georgia, serif; font-weight: bold; padding: 8px 12px; border-radius: 8px; font-size: 18px; }
  .header h1 { color: white; font-size: 20px; }
  .header p { color: #00A4C7; font-size: 13px; }
  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .row.full { grid-template-columns: 1fr; }
  label { display: block; font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  input, select { width: 100%; background: #0a0f1a; border: 1px solid #374151; border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #e5e7eb; outline: none; }
  input:focus { border-color: #00A4C7; }
  .btn { width: 100%; padding: 14px; background: #00A4C7; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #0090b0; }
  .btn:active { transform: scale(0.98); }
  @media (max-width: 500px) { .row { grid-template-columns: 1fr; } .container { padding: 16px 12px; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">RS</div>
  <div>
    <h1>Work Order Generator</h1>
    <p>Fill in → Generate PDF → Done</p>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="row">
      <div><label>Store #</label><input id="storeNumber" placeholder="00806"></div>
      <div><label>WO #</label><input id="woNumber" placeholder="1963606"></div>
    </div>
    <div class="row full">
      <div><label>Store Address</label><input id="address" placeholder="301 Greenwich Ave"></div>
    </div>
    <div class="row">
      <div><label>City, State Zip</label><input id="cityStateZip" placeholder="Greenwich, CT 06830"></div>
      <div><label>Store Phone</label><input id="storePhone" placeholder="(203) 661-3042"></div>
    </div>
    <div class="row">
      <div><label>Service Date</label><input id="serviceDate" type="date"></div>
      <div><label>Technician</label><input id="technician" placeholder="Tech name or company"></div>
    </div>
    <div class="row">
      <div><label>Start Time</label><input id="startTime" type="time" value="22:00"></div>
      <div><label>Stop Time</label><input id="stopTime" type="time" value="03:30"></div>
    </div>
  </div>

  <button class="btn" onclick="generateWO()">Generate Work Order PDF</button>
</div>

<script>
const SIG_NW = 124, SIG_NH = 33;
const SIG_SEGS = [[87,0,2],[87,1,2],[87,2,2],[86,3,2],[86,4,2],[86,5,2],[86,6,2],[85,7,2],[85,8,1],[84,9,2],[45,10,1],[84,10,1],[45,11,1],[83,11,2],[45,12,1],[68,12,1],[82,12,3],[16,13,1],[39,13,1],[45,13,2],[68,13,1],[81,13,3],[15,14,3],[38,14,3],[45,14,2],[56,14,2],[68,14,1],[80,14,4],[5,15,2],[14,15,2],[17,15,1],[37,15,2],[40,15,2],[45,15,1],[55,15,3],[68,15,1],[78,15,10],[5,16,4],[14,16,2],[17,16,1],[32,16,1],[36,16,2],[41,16,2],[44,16,2],[54,16,2],[57,16,1],[68,16,1],[77,16,7],[86,16,2],[91,16,5],[109,16,5],[4,17,6],[13,17,2],[17,17,1],[27,17,6],[35,17,2],[41,17,1],[43,17,2],[54,17,1],[57,17,1],[68,17,1],[76,17,7],[87,17,1],[90,17,2],[94,17,3],[108,17,3],[113,17,2],[4,18,3],[9,18,1],[13,18,2],[17,18,1],[25,18,8],[35,18,2],[41,18,3],[53,18,2],[57,18,1],[68,18,1],[75,18,2],[78,18,4],[87,18,1],[90,18,1],[96,18,1],[103,18,2],[107,18,1],[114,18,2],[3,19,3],[9,19,1],[13,19,2],[17,19,2],[24,19,2],[31,19,2],[35,19,1],[42,19,2],[53,19,2],[56,19,2],[68,19,2],[75,19,1],[77,19,5],[87,19,4],[96,19,2],[102,19,3],[106,19,2],[115,19,1],[3,20,3],[9,20,2],[13,20,1],[17,20,2],[24,20,1],[30,20,3],[34,20,2],[42,20,2],[53,20,1],[56,20,2],[68,20,2],[75,20,3],[79,20,2],[87,20,3],[97,20,2],[102,20,5],[115,20,2],[3,21,2],[9,21,2],[12,21,2],[18,21,1],[24,21,1],[30,21,5],[41,21,1],[44,21,1],[52,21,2],[56,21,2],[68,21,2],[75,21,2],[78,21,3],[87,21,3],[98,21,1],[101,21,5],[115,21,2],[3,22,1],[10,22,1],[12,22,2],[18,22,1],[24,22,2],[29,22,2],[32,22,2],[40,22,2],[44,22,2],[51,22,2],[56,22,2],[68,22,3],[74,22,6],[87,22,2],[98,22,2],[101,22,2],[104,22,2],[116,22,1],[2,23,2],[10,23,3],[18,23,2],[25,23,3],[29,23,1],[31,23,2],[40,23,1],[45,23,2],[51,23,2],[56,23,1],[68,23,3],[74,23,5],[88,23,1],[99,23,3],[104,23,2],[116,23,2],[2,24,2],[10,24,3],[19,24,1],[27,24,5],[39,24,2],[46,24,2],[49,24,3],[56,24,1],[68,24,1],[70,24,2],[73,24,6],[88,24,1],[100,24,2],[104,24,1],[116,24,2],[1,25,2],[19,25,2],[27,25,2],[39,25,1],[47,25,4],[54,25,3],[68,25,1],[71,25,1],[74,25,4],[88,25,1],[100,25,1],[117,25,1],[1,26,2],[20,26,8],[38,26,1],[54,26,3],[67,26,2],[71,26,2],[75,26,2],[88,26,1],[117,26,2],[1,27,2],[21,27,5],[37,27,2],[54,27,3],[67,27,2],[72,27,4],[118,27,5],[1,28,1],[36,28,2],[54,28,3],[66,28,2],[119,28,5],[0,29,2],[35,29,2],[54,29,8],[64,29,4],[0,30,2],[35,30,1],[54,30,3],[59,30,7],[54,31,2],[54,32,2]];

function generateWO() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'pt', 'letter');
  const W = doc.internal.pageSize.getWidth();
  const M = 36;
  const R = W - M;

  const store = document.getElementById('storeNumber').value || '';
  const wo = document.getElementById('woNumber').value || '';
  const addr = document.getElementById('address').value || '';
  const csz = document.getElementById('cityStateZip').value || '';
  const phone = document.getElementById('storePhone').value || '';
  const dateVal = document.getElementById('serviceDate').value || '';
  const tech = document.getElementById('technician').value || 'Rolling Suds of Westchester-Stamford';
  const start = document.getElementById('startTime').value || '';
  const stop = document.getElementById('stopTime').value || '';

  const cszParts = csz.split(',').map(s => s.trim());
  const city = cszParts[0] || '';
  const stateZip = (cszParts[1] || '').trim();

  let y = 36;

  // Header left
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
  doc.text('SUPERCLEAN SERVICE COMPANY, INC', M, y); y += 12;
  doc.setFont('helvetica', 'italic'); doc.setFontSize(8);
  doc.text('Super Service, Super Reliable, Super Clean', M, y); y += 14;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
  doc.text('PO Box 551802', M, y); y += 10;
  doc.text('Dallas, TX 75355', M, y); y += 10;
  doc.text('P: 888-337-8737', M, y); y += 10;
  doc.text('Fax: 972-926-9733', M, y);

  // Header right
  doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
  doc.text('WO # ' + wo, R, 38, { align: 'right' });
  const rc = W * 0.48;
  doc.setFontSize(9);
  let ry = 56;
  doc.text('SERVICE: Pressure Wash Patio/Sidewalk/Drive Thru', rc, ry); ry += 13;
  doc.text('Starbucks # ' + store, rc, ry); ry += 11;
  doc.setFont('helvetica', 'normal');
  doc.text(addr, rc, ry); ry += 11;
  doc.text(city + ', ' + stateZip, rc, ry); ry += 11;
  if (phone) doc.text(phone, rc, ry);

  y += 20;

  // Service date table
  const c1 = (W - M*2) * 0.35, c2 = (W - M*2) * 0.38, c3 = (W - M*2) * 0.27;
  doc.setFillColor('#333333');
  doc.rect(M, y, c1, 14, 'FD'); doc.rect(M+c1, y, c2, 14, 'FD'); doc.rect(M+c1+c2, y, c3, 14, 'FD');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(7); doc.setTextColor('#FFFFFF');
  doc.text('SERVICE DATE', M+4, y+10);
  doc.text('AUTHORIZED STARBUCKS WORKTASK#', M+c1+4, y+10);
  doc.text('IVR INSTRUCTIONS', M+c1+c2+4, y+10);

  doc.setTextColor('#000000');
  const dy = y + 14;
  doc.setDrawColor('#000000'); doc.setLineWidth(0.75);
  doc.rect(M, dy, c1, 18, 'S'); doc.rect(M+c1, dy, c2, 18, 'S'); doc.rect(M+c1+c2, dy, c3, 18, 'S');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
  doc.text(formatDateFull(dateVal), M+4, dy+12);
  doc.setFont('helvetica', 'normal');
  doc.text(wo, M+c1+4, dy+12);
  doc.text('No IVR needed', M+c1+c2+4, dy+12);

  y = dy + 18 + 12;

  // Service line
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
  doc.text('Pressure Wash Patio/Sidewalk/Drive Thru', M, y);
  doc.text('COMPLETE_____X_____', R-140, y);
  y += 16;

  // Instructions box
  const instrTop = y;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
  const instrText = 'Crew to perform pressure wash of patio, sidewalks around all sides and rear of building, back door pad, and drive-thru for Starbucks\'s restaurants. Service window starts 1 hour after closing, finishes 2 hours before opening. Most stores are open 5AM-9PM on weekdays and close at 10PM/11PM on weekends. Store may not have an operational outside water spigot. Crew must be prepared to provide water via a water tank. Crews must ensure compliance with all jurisdictional requirements. Chemicals used must be "Green" and not harmful. All personnel must wear appropriate PPE, including gloves, safety goggles, ear protection, and non-slip footwear. Drive thru cleaned 30\' before drive to 10\' after the service window. Pictures are required for payment with a 5 photo minimum, 2 before & after pictures, 1 picture of the front door area with address on it. Report back to Account Manager if there are any safety/security issues noted during services.';
  const instrLines = doc.splitTextToSize(instrText, W - M*2 - 8);
  doc.text(instrLines, M+4, y+10);
  const instrH = instrLines.length * 8 + 16;
  doc.setDrawColor('#000000'); doc.setLineWidth(0.5);
  doc.rect(M, instrTop-4, W-M*2, instrH, 'S');
  y = instrTop + instrH + 16;

  // Photo warning
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
  const pc2 = W/2 + 10;
  doc.text('IMPORTANT! 5 PHOTOS ARE REQUIRED FOR PAYMENT', M, y);
  doc.text('OF SERVICES ! TWO AREAS  OF PHOTOS', pc2, y); y += 12;
  doc.text('THAT HAVE BEFORE AND AFTER  TAKEN AND 1 PHOTO', M, y);
  doc.text('TAKEN OF FRONT DOOR WITH ADDRESS', pc2, y); y += 18;

  doc.setLineWidth(0.5); doc.line(M, y, R, y); y += 14;

  // Checklist
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
  doc.text('Technician Completion Checklist', M, y); y += 12;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
  doc.text('Complete all applicable items below.', M, y); y += 16;

  const items = [
    'Remember, respectful conduct is a MUST!',
    'Bring WO and Photo ID to service.',
    'Pre treat all heavy stains using "Green" chemicals',
    'Remove tables and chairs & replace after service',
    'Sidewalks, patio, and backdoor pad power washed',
    'Take before and after photos (5 minimum required)',
    'Make sure  wastewater properly disposed of',
    'Wipe down windows of any over spray',
    'Photos sent to   Starbucks@gosuperclean.com',
  ];
  items.forEach(item => { doc.text('_X_', M, y); doc.text(item, M+22, y); y += 12; });
  y += 12;

  // Completion fields
  const flx = M + 95, flw = 200;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8);

  doc.text('Date Completed:', M, y);
  doc.line(flx, y+1, flx+flw, y+1);
  if (dateVal) doc.text(formatDateShort(dateVal), flx+4, y); y += 14;

  doc.text('Technician:', M, y);
  doc.line(flx, y+1, flx+flw, y+1);
  doc.text(tech, flx+4, y); y += 14;

  doc.text('Start Time:', M, y);
  doc.line(flx, y+1, flx+flw, y+1);
  if (start) doc.text(formatTime(start), flx+4, y); y += 14;

  doc.text('Stop Time:', M, y);
  doc.line(flx, y+1, flx+flw, y+1);
  if (stop) doc.text(formatTime(stop), flx+4, y); y += 14;

  doc.text('Total Hours:', M, y);
  doc.line(flx, y+1, flx+flw, y+1);
  if (start && stop) doc.text(calcHours(start, stop), flx+4, y); y += 22;

  // Signature
  doc.text('Tech Signature:', M, y);
  doc.line(flx, y+1, flx+flw, y+1);

  const sigW = 140, sigH = (SIG_NH/SIG_NW)*sigW;
  const sx = flx+8, sy = y - sigH + 2;
  const scX = sigW/SIG_NW, scY = sigH/SIG_NH;
  doc.setFillColor('#1a1a2e');
  SIG_SEGS.forEach(([px,py,pw]) => { doc.rect(sx+px*scX, sy+py*scY, pw*scX, scY, 'F'); });

  y += 30;
  doc.setLineWidth(0.5); doc.line(M, y, R, y); y += 14;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
  doc.text('Technician:', M, y); y += 14;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
  doc.text('Fax this signed work order to Superclean no more than 24 hours after service completion to avoid penalty', M, y); y += 10;
  doc.text('Work orders received more than 30 days after service will not be considered valid', M, y);

  doc.save('WO_SB' + store + '_' + wo + '.pdf');
}

function formatDateFull(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  return days[dt.getDay()] + ' ' + (dt.getMonth()+1) + '/' + dt.getDate() + '/' + dt.getFullYear() + ' 12:00 AM';
}

function formatDateShort(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return (dt.getMonth()+1).toString().padStart(2,'0') + '/' + dt.getDate().toString().padStart(2,'0') + '/' + dt.getFullYear();
}

function formatTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return (h%12||12) + ':' + m.toString().padStart(2,'0') + (h>=12?' PM':' AM');
}

function calcHours(s, e) {
  const [sh,sm] = s.split(':').map(Number);
  const [eh,em] = e.split(':').map(Number);
  let sm2 = sh*60+sm, em2 = eh*60+em;
  if (em2 < sm2) em2 += 1440;
  const d = em2 - sm2;
  return Math.floor(d/60) + 'h ' + (d%60) + 'm';
}

// Set today's date as default
document.getElementById('serviceDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
